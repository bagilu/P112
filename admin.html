<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>P112 管理端</title><link rel="stylesheet" href="assets/css/style.css"></head><body data-page="admin">
<header><h1>P112 管理端</h1><p>系統管理、單位管理、帳號、排班、工作項目與時數報表</p></header><nav class="nav"><a href="index.html">登入</a><a href="student.html">學生端</a><a href="admin.html">管理端</a><button class="secondary" id="logoutBtn">登出</button></nav>
<main class="wrap"><div id="adminMsg" class="notice hidden"></div><section class="grid"><div class="card"><h2>目前使用者</h2><p id="meBox" class="muted">讀取中...</p><label>管理單位</label><select id="adminUnitSelect"></select></div><div class="card"><h2>建立單位</h2><label>單位名稱</label><input id="newUnitName" placeholder="智慧商情研究室"><label>類型</label><select id="newUnitType"><option value="lab">lab</option><option value="office">office</option><option value="company">company</option><option value="center">center</option><option value="project">project</option></select><label>照片寄送信箱</label><input id="newUnitPhotoEmail" placeholder="teacher@example.com"><button id="createUnitBtn">建立單位</button></div></section>
<section class="grid"><div class="card"><h2>建立使用者</h2><label>Email</label><input id="newUserEmail" type="email"><label>姓名</label><input id="newUserName"><label>初始密碼</label><input id="newUserPassword" type="text" value="ChangeMe2026!"><label>系統角色</label><select id="newUserRole"><option value="user">user</option><option value="sysadmin">sysadmin</option></select><button id="createUserBtn">建立帳號</button></div><div class="card"><h2>加入單位成員</h2><label>使用者</label><select id="memberUserSelect"></select><label>單位角色</label><select id="memberRole"><option value="worker">worker</option><option value="supervisor">supervisor</option><option value="unit_admin">unit_admin</option></select><button id="addMemberBtn">加入目前單位</button></div></section>
<section class="grid"><div class="card"><h2>建立值班時段</h2><label>日期</label><input id="slotDate" type="date"><div class="two"><div><label>開始</label><input id="slotStart" type="time" value="09:00"></div><div><label>結束</label><input id="slotEnd" type="time" value="09:30"></div></div><div class="two"><div><label>正式名額</label><input id="regularCapacity" type="number" min="0" value="1"></div><div><label>待命名額</label><input id="standbyCapacity" type="number" min="0" value="0"></div></div><label>備註</label><input id="slotNote"><button id="createSlotBtn">建立時段</button></div><div class="card"><h2>建立工作項目</h2><label>分類名稱</label><input id="categoryName" placeholder="環境整理"><button id="addCategoryBtn" class="secondary">建立分類</button><label>分類 ID（建立分類後可填入）</label><input id="categoryId"><label>工作項目名稱</label><input id="workItemName" placeholder="桌面整理"><label>完成標準</label><textarea id="workItemStandard" placeholder="桌面無垃圾、公共物品歸位。"></textarea><button id="addWorkItemBtn">建立工作項目</button></div></section>
<section class="card"><h2>使用者清單</h2><button id="loadUsersBtn">重新整理</button><div class="table-wrap"><table><thead><tr><th>姓名</th><th>Email</th><th>系統角色</th><th>啟用</th><th>User ID</th></tr></thead><tbody id="userRows"></tbody></table></div></section>

<section class="card"><h2>目前單位成員</h2><p class="muted">可將成員退出目前單位。退出後，既有簽到簽退與時數紀錄仍保留。</p><button id="loadMembersBtn">讀取目前單位成員</button><div class="table-wrap"><table><thead><tr><th>姓名</th><th>Email</th><th>單位角色</th><th>狀態</th><th>操作</th></tr></thead><tbody id="memberRows"></tbody></table></div></section>
<section class="card"><h2>目前單位值班時段</h2><p class="muted">只有尚未有人預約、簽到或簽退的時段可以刪除。</p><div class="toolbar"><label>起日<input id="adminSlotFrom" type="date"></label><label>迄日<input id="adminSlotTo" type="date"></label><button id="loadAdminSlotsBtn">讀取時段</button></div><div class="table-wrap"><table><thead><tr><th>日期</th><th>時間</th><th>正式</th><th>待命</th><th>狀態</th><th>操作</th></tr></thead><tbody id="adminSlotRows"></tbody></table></div></section>
<section class="card"><h2>時數摘要</h2><button id="loadHoursBtn">讀取目前單位時數</button><div class="table-wrap"><table><thead><tr><th>單位</th><th>姓名</th><th>時數</th></tr></thead><tbody id="hourRows"></tbody></table></div></section>
</main><footer class="footer">P112 LabDuty | SBI Lab</footer><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="assets/js/app.js"></script></body></html>
