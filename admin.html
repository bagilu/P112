<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>P112 管理端</title><link rel="stylesheet" href="assets/css/style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="assets/js/app.js"></script></head><body>
<header class="topbar"><div class="brand">P112 管理端 <small>多單位設定・排班・工作項目・出勤報表</small></div><nav class="nav"><a href="index.html">首頁</a><a href="student.html">學生端</a><button onclick="p112SignOut()">登出</button></nav></header>
<main class="wrap"><div id="msg" class="hidden"></div><div class="grid">
<section class="card span-12"><h2>管理單位選擇</h2><div class="row"><select id="unitSelect"></select><button class="btn" onclick="selectUnit()">使用此單位</button></div><p id="currentUnit" class="notice hidden"></p></section>
<section class="card span-6"><h2>建立單位</h2><p class="muted">僅 system_admin 可建立新單位。一般單位管理員只能管理自己所屬單位。</p><label>單位名稱</label><input id="newUnitName" placeholder="智慧商情研究室"><label>單位類型</label><select id="newUnitType"><option value="lab">lab</option><option value="office">office</option><option value="center">center</option><option value="company">company</option><option value="project">project</option></select><label>照片寄送信箱</label><input id="newPhotoEmail" placeholder="teacher@example.edu.tw"><button class="btn" onclick="createUnit()">建立單位</button></section>
<section class="card span-6"><h2>新增成員</h2><p class="muted">使用者必須先在 Supabase Auth 建立帳號，並於 p112_profiles 建立 profile。</p><label>使用者 Email</label><input id="memberEmail" placeholder="student@example.edu.tw"><label>單位角色</label><select id="memberRole"><option value="worker">worker</option><option value="supervisor">supervisor</option><option value="unit_admin">unit_admin</option></select><button class="btn" onclick="addMember()">加入目前單位</button></section>
<section class="card span-12"><h2>單位打卡設定</h2><div class="grid"><div class="span-4"><label>時段分鐘</label><input id="slotMinutes" type="number" value="30"></div><div class="span-4"><label>待命比例</label><input id="standbyRate" type="number" step="0.01" value="0.10"></div><div class="span-4"><label>照片寄送信箱</label><input id="photoEmail"></div></div><label><input id="requirePhotoEmail" type="checkbox" style="width:auto"> 要求 email 照片佐證</label><label><input id="allowStandby" type="checkbox" style="width:auto" checked> 啟用待命預約</label><label><input id="requireWorkItems" type="checkbox" style="width:auto" checked> 簽退需勾選工作項目</label><label><input id="requireWorkSummary" type="checkbox" style="width:auto" checked> 簽退需填寫工作摘要</label><label><input id="enableLabCode" type="checkbox" style="width:auto"> 啟用現場動態碼（V2 預留，V1 不建議開啟）</label><button class="btn" onclick="saveSettings()">儲存設定</button></section>
<section class="card span-6"><h2>建立單日時段</h2><div class="row"><div><label>日期</label><input id="slotDate" type="date"></div><div><label>起始</label><input id="startTime" type="time" value="09:00"></div><div><label>結束</label><input id="endTime" type="time" value="17:00"></div></div><button class="btn" onclick="generateSlots()">產生半小時時段</button></section>
<section class="card span-6"><h2>工作分類與項目</h2><label>分類名稱</label><input id="catName" placeholder="環境整理"><button class="btn secondary" onclick="createCategory()">新增分類</button><label>工作分類</label><select id="catSelect"></select><label>工作項目</label><input id="itemName" placeholder="桌面整理"><label>完成標準</label><textarea id="itemStandard" placeholder="桌面無垃圾，公共物品歸位。"></textarea><button class="btn" onclick="createWorkItem()">新增工作項目</button></section>
<section class="card span-12"><h2>出勤與工作紀錄</h2><div class="btnbar"><button class="btn secondary" onclick="loadAttendance()">載入紀錄</button><button class="btn ghost" onclick="exportAttendance()">匯出 CSV</button></div><div id="attendanceBox"></div></section>
<section class="card span-12"><h2>學生累積時數</h2><button class="btn secondary" onclick="loadHours()">載入時數</button><div id="hoursBox"></div></section>
</div></main><footer class="footer">P112 LabDuty Admin</footer>
<script>
let client, attendanceRows=[]; try{client=p112Init();}catch(e){p112Msg($('msg'),e.message,'error')}
$('slotDate').value=p112Today();
async function init(){ const user=await p112User(); if(!user){location.href='index.html';return;} await loadUnits(); }
async function loadUnits(){ try{const units=await p112ListMyUnits(); $('unitSelect').innerHTML=units.filter(u=>['unit_admin','supervisor','system_admin'].includes(u.role_in_unit)||u.system_role==='system_admin').map(u=>`<option value="${u.unit_id}">${u.unit_name}｜${u.role_in_unit}</option>`).join(''); if($('unitSelect').options.length){selectUnit();}}catch(e){p112Msg($('msg'),e.message,'error')} }
function selectUnit(){ const opt=$('unitSelect').selectedOptions[0]; if(!opt) return; p112SetUnit(opt.value,opt.textContent.split('｜')[0]); $('currentUnit').textContent='目前管理單位：'+opt.textContent; $('currentUnit').classList.remove('hidden'); loadSettings(); loadCategories(); }
async function createUnit(){ const {error}=await client.rpc('p112_create_unit',{p_unit_name:$('newUnitName').value,p_unit_type:$('newUnitType').value,p_photo_email:$('newPhotoEmail').value}); if(error)p112Msg($('msg'),error.message,'error'); else{p112Msg($('msg'),'單位已建立。','ok');loadUnits();}}
async function addMember(){ const u=p112GetUnit(); const {error}=await client.rpc('p112_add_unit_member_by_email',{p_unit_id:u.unit_id,p_email:$('memberEmail').value,p_role_in_unit:$('memberRole').value}); if(error)p112Msg($('msg'),error.message,'error'); else p112Msg($('msg'),'成員已加入。','ok'); }
async function loadSettings(){ const u=p112GetUnit(); const {data,error}=await client.from('p112_unit_settings').select('*').eq('unit_id',u.unit_id).single(); if(error)return; $('slotMinutes').value=data.slot_minutes; $('standbyRate').value=data.standby_credit_rate; $('photoEmail').value=data.photo_email||''; $('requirePhotoEmail').checked=data.require_photo_email; $('allowStandby').checked=data.allow_standby; $('requireWorkItems').checked=data.require_work_items; $('requireWorkSummary').checked=data.require_work_summary; $('enableLabCode').checked=data.enable_lab_code; }
async function saveSettings(){ const u=p112GetUnit(); const {error}=await client.from('p112_unit_settings').upsert({unit_id:u.unit_id,slot_minutes:+$('slotMinutes').value,standby_credit_rate:+$('standbyRate').value,photo_email:$('photoEmail').value,require_photo_email:$('requirePhotoEmail').checked,allow_standby:$('allowStandby').checked,require_work_items:$('requireWorkItems').checked,require_work_summary:$('requireWorkSummary').checked,enable_lab_code:$('enableLabCode').checked}); if(error)p112Msg($('msg'),error.message,'error'); else p112Msg($('msg'),'設定已儲存。','ok'); }
async function generateSlots(){ const u=p112GetUnit(); const {error}=await client.rpc('p112_generate_slots',{p_unit_id:u.unit_id,p_slot_date:$('slotDate').value,p_start_time:$('startTime').value,p_end_time:$('endTime').value,p_slot_minutes:+$('slotMinutes').value}); if(error)p112Msg($('msg'),error.message,'error'); else p112Msg($('msg'),'時段已產生。','ok'); }
async function createCategory(){ const u=p112GetUnit(); const {error}=await client.from('p112_work_categories').insert({unit_id:u.unit_id,category_name:$('catName').value}); if(error)p112Msg($('msg'),error.message,'error'); else{p112Msg($('msg'),'分類已新增。','ok');loadCategories();} }
async function loadCategories(){ const u=p112GetUnit(); const {data}=await client.from('p112_work_categories').select('category_id,category_name').eq('unit_id',u.unit_id).eq('is_active',true).order('display_order'); $('catSelect').innerHTML=(data||[]).map(c=>`<option value="${c.category_id}">${c.category_name}</option>`).join(''); }
async function createWorkItem(){ const u=p112GetUnit(); const {error}=await client.from('p112_work_items').insert({unit_id:u.unit_id,category_id:$('catSelect').value,item_name:$('itemName').value,standard:$('itemStandard').value}); if(error)p112Msg($('msg'),error.message,'error'); else p112Msg($('msg'),'工作項目已新增。','ok'); }
async function loadAttendance(){ const u=p112GetUnit(); const {data,error}=await client.rpc('p112_admin_attendance_report',{p_unit_id:u.unit_id}); if(error){p112Msg($('msg'),error.message,'error');return} attendanceRows=data||[]; $('attendanceBox').innerHTML=`<table><tr><th>姓名</th><th>日期時段</th><th>類型/狀態</th><th>簽到/簽退</th><th>摘要</th><th>異常</th></tr>${attendanceRows.map(r=>`<tr><td>${r.display_name}<br><span class="small">${r.email}</span></td><td>${r.slot_date} ${r.start_time?.slice(0,5)}–${r.end_time?.slice(0,5)}</td><td>${r.reservation_type}<br>${p112StatusLabel(r.status)}</td><td>${r.checkin_at?p112FmtDate(r.checkin_at):''}<br>${r.checkout_at?p112FmtDate(r.checkout_at):''}</td><td>${r.work_summary||''}</td><td>${r.issue_report||''}</td></tr>`).join('')}</table>`; }
function exportAttendance(){ p112CsvDownload('p112_attendance.csv', attendanceRows); }
async function loadHours(){ const u=p112GetUnit(); const {data,error}=await client.rpc('p112_admin_hours_report',{p_unit_id:u.unit_id}); if(error){p112Msg($('msg'),error.message,'error');return} $('hoursBox').innerHTML=`<table><tr><th>姓名</th><th>Email</th><th>累積時數</th></tr>${(data||[]).map(r=>`<tr><td>${r.display_name}</td><td>${r.email}</td><td>${Number(r.total_hours||0).toFixed(2)}</td></tr>`).join('')}</table>`; }
init();
</script></body></html>
