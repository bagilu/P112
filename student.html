<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>P112 學生端</title><link rel="stylesheet" href="assets/css/style.css"></head><body data-page="student">
<header><h1>P112 學生端</h1><p>預約、簽到、簽退、工作紀錄與時數查詢</p></header><nav class="nav"><a href="index.html">登入</a><a href="student.html">學生端</a><a href="admin.html">管理端</a><button class="secondary" id="logoutBtn">登出</button></nav>
<main class="wrap"><div id="authBox" class="notice danger hidden">尚未登入，請先回登入頁。</div>
<section class="grid"><div class="card"><h2>目前使用者</h2><p id="meBox" class="muted">讀取中...</p><label>切換單位</label><select id="unitSelect"></select><p id="unitPhotoNotice" class="notice warn hidden"></p></div><div class="card"><h2>我的累積時數</h2><div id="hourBox" class="kpi">--</div><p class="muted">依已完成簽退紀錄與時數交易計算。</p></div></section>
<section class="card"><h2>可預約時段</h2><div class="toolbar"><label>起日<input id="slotFrom" type="date"></label><label>迄日<input id="slotTo" type="date"></label><button id="loadSlotsBtn">讀取時段</button></div><div class="table-wrap"><table><thead><tr><th>日期</th><th>時間</th><th>正式值班</th><th>待命</th><th>操作</th></tr></thead><tbody id="slotRows"></tbody></table></div></section>
<section class="card"><h2>我的待完成預約</h2><button id="loadMyReservationsBtn">重新整理</button><div class="table-wrap"><table><thead><tr><th>單位</th><th>日期</th><th>時間</th><th>類型</th><th>狀態</th><th>操作</th></tr></thead><tbody id="reservationRows"></tbody></table></div></section>
<section class="card"><h2>簽退表單</h2><p class="muted">按下某筆已簽到預約的「簽退」後，請在此填寫工作內容。</p><input id="checkoutReservationId" placeholder="reservation_id" readonly><label>工作項目</label><div id="workItemsBox" class="grid"></div><label>工作摘要</label><textarea id="workSummary" placeholder="例如：完成桌面整理、檢查展示螢幕、更新專案清單。"></textarea><label>異常回報</label><textarea id="abnormalNote" placeholder="若無異常可留空或填無。"></textarea><button id="checkoutSubmitBtn" class="ok">送出簽退</button><p id="studentMsg" class="muted"></p></section>
</main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="assets/js/app.js"></script></body></html>
